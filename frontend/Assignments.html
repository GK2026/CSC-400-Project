<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Correlation Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href=../CSS/"Assignments.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="logo">
        <span class="logo-icon">CA</span>
        <span class="logo-text">Correlation Assistant</span>
    </div>

    <nav>
        <a href="#" id="Back">Home</a>
        <a href="#" id="link-correlation">Correlation Check</a>
        <a href="#" id="link-explore">Explore Data</a>
    </nav>

    <div class="nav-auth">
        <select id="student-select">
            <option>Student Name</option>
            <option>Logout</option>
        </select>
    </div>
</header>

<!-- ================= BREADCRUMBS ================= -->
<div class="breadcrumbs">
    <a href="#" id="Return">Home</a> ➔
    <a href="#" id="Current">Assignments</a>
</div>

<!-- ================= MAIN LAYOUT ================= -->
<div class="explore-container">

    <!-- LEFT SECTION (INPUTS) -->
    <div class="input-panel">
        <h2>Check Your Correlation</h2>

        <h3>Correlation</h3>

        <div class="form-row">
            <select id="country-select">
                <option>Select the type of correlation</option>
                <option>Positive</option>
                <option>None</option>
                <option>Negative</option>
            </select>
        </div>

        <div class="search-filter-container">
            <label for="verbal-input">Verbal Correlation</label>
            <input id="verbal-input" type="text" placeholder="Text Box">
            <button id="submit-btn">Submit</button>
        </div>
    </div>

    <!-- RIGHT SECTION (TABLE) -->
    <div class="output-pane">
        <h2>Past Correlations</h2>

        <div class="table-container">
            <table id="table1">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Indicators</th>
                        <th>Coefficient</th>
                        <th>Feedback</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td contenteditable>1</td>
                        <td contenteditable>2</td>
                        <td contenteditable>1</td>
                        <td contenteditable>2</td>
                    </tr>
                    <tr>
                        <td contenteditable>2</td>
                        <td contenteditable>4</td>
                        <td contenteditable>1</td>
                        <td contenteditable>2</td>
                    </tr>
                    <tr>
                        <td contenteditable>3</td>
                        <td contenteditable>6</td>
                        <td contenteditable>1</td>
                        <td contenteditable>2</td>
                    </tr>
                    <tr>
                        <td contenteditable>4</td>
                        <td contenteditable>8</td>
                        <td contenteditable>1</td>
                        <td contenteditable>2</td>
                    </tr>
                    <tr>
                        <td contenteditable>5</td>
                        <td contenteditable>10</td>
                        <td contenteditable>1</td>
                        <td contenteditable>2</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="footer">
            <p>Correlation Assistant - SCSU CSC400 Capstone</p>
        </div>
    </footer>
<script src="../JS/Assignments.js"></script>

</body>
</html>
