<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GapMinder Sign Up</title>
    <link rel="stylesheet" href="../CSS/signup.css" />
</head>
<body>
    <div class="container">
        <h1>Welcome to the GapMinder Project!</h1>

        <div class="form-box">
            <label for="Name">Enter your first name</label>
            <input type="text" id="Name" placeholder="First name" />

            <label for="usernamesignup">Enter your school email</label>
            <input type="email" id="usernamesignup" placeholder="School email" />

            <label for="passwordEntry">Choose password</label>
            <input type="password" id="passwordEntry" placeholder="Password" />

            <button id="questDirect" type="button">Sign Up</button>
        </div>

        <button id="returnLogin" type="button">Return to login</button>
    </div>

    <script src="../JS/signup.js"></script>
</body>
</html>
