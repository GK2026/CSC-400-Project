<html lang="en">

<body>

<!-- ================= HEADER ================= -->
<header>

    <nav>

            <select id="student-select">
                <option>Student Name</option>

            <a href="ExploreData2.html">
                <button>Choose</button>
            </a>

        <div class="option-card">

            <a href="ExploreData3.html">
