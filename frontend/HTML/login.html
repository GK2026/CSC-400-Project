<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>GapMinder Project</title>
	<link rel="stylesheet" href="../CSS/login.css" />

</head>
<body>
	<h1>Welcome back</h1>
	<div id="signIn"> 
		<div class="formGroup">
			<label for="usernameEntry">Enter your school email</label>
			<input type="text" placeholder="example@southernct.edu" id="username" required>
		</div>

		<div class="formGroup">
			<label for="passwordEntry"> Password</label>
			<input type="password" id="passwordEntry" name="password" required>
		</div>

		<button type="submit" id="questDirect">Login</button>
	</div>

</div>
<button id="signUp">New student? Sign Up Here!</button>
<button id="teacherSignUp" style="margin-top:8px; background:none; border:none; color:#7c3aed; cursor:pointer; font-size:0.85rem; text-decoration:underline;">Teacher? Register with invite code</button>
<script src="../JS/login.js"></script>
</body>
</html>
