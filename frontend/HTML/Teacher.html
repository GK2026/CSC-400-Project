<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GapMinder Project Dashboard</title>
    <link rel="stylesheet" href="CSS/Teacher.css">
</head>
<body>

<header>
    <h1><span>GM</span>GapMinder Project</h1>

    <nav>
        
        <div class="form-group">
            <select id="student-select">
                <option>Teacher Name</option>
                <option>Logout</option>
            </select>
        </div>
    </nav>
</header>

<main>

    <main class="dashboard-container">
        <h2 class="dashboard-title">Teacher Dashboard</h2>

        <div class="search-section">
            <label for="student-search">Search for student</label>
            <input type="text" id="student-search" placeholder="Search Box" class="search-input">
        </div>

        <div class="table-wrapper">
            <table class="dashboard-table">
                <thead>
                    <tr>
                        <th>Students Name</th>
                        <th>Submission Date</th>
                        <th>Correlation (Verbal and Numerical)</th>
                        <th>Delete</th>
                        <th class="scroll-filler"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                        <td>&nbsp;</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
