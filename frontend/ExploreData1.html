<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correlation Assistant</title>
    <link rel="stylesheet" href="../CSS/Home.css" /> 
</head>
<body>

<!-- ================= HEADER ================= -->
<header>
    <!-- Logo on the left -->
    <div class="logo">
        <span class="logo-icon">CA</span>
        <span class="logo-text">Correlation Assistant</span>
    </div>

    <!-- Nav links in the center -->
    <nav>
        <a href="#" id="Back">Home</a>
        <a href="#" id="link-correlation">Correlation Check</a>
        <a href="#" id="link-explore">Explore Data</a>
    </nav>

    <!-- Optional right side (auth buttons) -->
    <div class="nav-auth">
        <select id="student-select">
        <option>Student Name</option>
        <option>Logout</option>
    </select>
</div>
</header>

<!-- ================= BREADCRUMB ================= -->
    <!-- Breadcrumbs-->
    <div class="breadcrumbs">
        <a href="#" id="Return">Home</a> ➔
        <a href="#" id="Current">Explore Data Choices</a> 
    </div>

<!-- ================= MAIN CONTENT ================= -->
<main>
    <h1>Choose how you want to explore the data</h1>

    <div class="options">
        <!-- Over Time -->
        <div class="option-card">
            <img src="https://img.icons8.com/ios/100/clock--v1.png" alt="Over Time">
            <h3>Over Time</h3>
            <p>One country, over several years</p>
            <a href="ExploreData2.html">
                <button>Choose</button>
            </a>
        </div>

        <!-- Across Countries -->
        <div class="option-card">
            <img src="https://easydrawingguides.com/wp-content/uploads/2018/01/how-to-draw-the-earth-featured-image-1200-1.png" alt="Across Countries">
            <h3>Across Countries</h3>
            <p>Multiple countries, in a single year</p>
            <a href="ExploreData3.html">
                <button>Choose</button>
            </a>
        </div>
    </div>
</main>
    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="footer">
            <p>Correlation Assistant - SCSU CSC400 Capstone</p>
        </div>
    </footer>
    
<script src="../JS/ExploreData1.js"></script>
</body>
</html>
