<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Correlation Assistant</title>
    <link rel="stylesheet" href="CSS/Teacher.css">
</head>
<body>

<header>
    <div class="logo">
        <span class="logo-icon">CA</span>
        <span class="logo-text">Correlation Assistant</span>
    </div>
    <nav>
        <a href="Home.html" id="link-home">Home</a>
    </nav>
    <div class="nav-auth">
        <div class="user-menu" id="user-menu">
            <button class="user-menu-btn" id="user-menu-btn">
                <span id="user-name-display">Teacher</span> &#9662;
            </button>
            <div class="user-menu-dropdown" id="user-menu-dropdown">
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </div>
</header>

<main class="dashboard-container">
    <div class="dashboard-header-row">
        <h2 class="dashboard-title">Teacher Dashboard</h2>
        <span class="pending-badge" id="pendingBadge" style="display:none;"></span>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('submissions')">📋 Submissions</button>
        <button class="tab-btn" onclick="switchTab('students')">👥 Students</button>
        <button class="tab-btn" onclick="switchTab('announcements')">📢 Announcements</button>
    </div>

    <!-- SUBMISSIONS TAB -->
    <div id="tab-submissions" class="tab-panel active">
        <div class="dashboard-controls">
            <input type="text" id="student-search" placeholder="Search by student, indicator..." class="search-input">
            <div class="filter-group">
                <select id="filterStatus">
                    <option value="">All Submissions</option>
                    <option value="pending">Needs Feedback</option>
                    <option value="reviewed">Feedback Given</option>
                </select>
            </div>
            <span class="submission-count" id="submissionCount"></span>
        </div>

        <div class="table-wrapper">
            <table class="dashboard-table">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Submitted</th>
                        <th>Indicators</th>
                        <th>Pearson r</th>
                        <th>Type</th>
                        <th>Explanation</th>
                        <th>Feedback</th>
                    </tr>
                </thead>
                <tbody id="submissionsBody">
                    <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- STUDENTS TAB -->
    <div id="tab-students" class="tab-panel" style="display:none;">
        <div class="dashboard-controls">
            <input type="text" id="student-search-2" placeholder="Search by name or indicator..." class="search-input">
            <div class="filter-group">
                <select id="filterSection">
                    <option value="">All Sections</option>
                    <option value="1">Section 1</option>
                    <option value="2">Section 2</option>
                    <option value="3">Section 3</option>
                    <option value="Unassigned">Unassigned</option>
                </select>
            </div>
            <span class="submission-count" id="studentCount"></span>
        </div>

        <div id="studentsContainer"></div>
    </div>

    <!-- ANNOUNCEMENTS TAB -->
    <div id="tab-announcements" class="tab-panel" style="display:none;">
        <div class="announcement-composer">
            <h3>Post an Announcement</h3>
            <textarea id="announcementMessage" placeholder="Write your announcement or assignment description..." rows="4"></textarea>
            <div class="announcement-controls">
                <select id="announcementSection">
                    <option value="">All Sections</option>
                    <option value="1">Section 1 only</option>
                    <option value="2">Section 2 only</option>
                    <option value="3">Section 3 only</option>
                </select>
                <button class="post-btn" onclick="postAnnouncement()">Post Announcement</button>
            </div>
        </div>

        <h3 style="margin:24px 0 12px; color:#111827;">Posted Announcements</h3>
        <div id="announcementsList"></div>
    </div>
</main>

<!-- Feedback Modal -->
<div class="feedback-overlay" id="feedbackOverlay">
    <div class="feedback-modal">
        <div class="feedback-modal-header">
            <h3>Leave Feedback</h3>
            <button class="feedback-close-btn" onclick="closeFeedbackModal()">✕</button>
        </div>
        <div class="feedback-modal-body">
            <div class="feedback-submission-info" id="feedbackSubmissionInfo"></div>
            <label class="feedback-label">Your feedback to the student</label>
            <textarea id="feedbackTextarea" placeholder="Write your feedback here..." rows="5"></textarea>
            <div class="feedback-modal-actions">
                <button class="feedback-cancel-btn" onclick="closeFeedbackModal()">Cancel</button>
                <button class="feedback-save-btn" onclick="saveFeedback()">Save Feedback</button>
            </div>
        </div>
    </div>
</div>

<script src="JS/utils.js"></script>
<script src="JS/Teacher.js"></script>
</body>
</html>
