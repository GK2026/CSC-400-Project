<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Correlation Assistant</title>
    <link rel="stylesheet" href="CSS/signup.css" />
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="logo-icon">CA</span>
            <span class="logo-text">Correlation Assistant</span>
        </div>

        <h1 id="pageTitle">Create Account</h1>

        <div class="form">
            <div>
                <label for="Name">First name</label>
                <input type="text" id="Name" placeholder="First name" />
            </div>
            <div>
                <label for="usernamesignup">School email</label>
                <input type="email" id="usernamesignup" placeholder="you@southernct.edu" />
            </div>
            <div>
                <label for="passwordEntry">Password</label>
                <input type="password" id="passwordEntry" placeholder="Password" />
            </div>
            <div>
                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password" />
                <span class="error-msg" id="passwordError">Passwords do not match.</span>
            </div>

            <label class="teacher-toggle">
                <input type="checkbox" id="isTeacher" />
                <span>I'm a teacher</span>
            </label>

            <div class="invite-section" id="inviteSection">
                <label for="inviteCode">Invite code</label>
                <input type="text" id="inviteCode" placeholder="Enter invite code" />
                <span class="invite-hint">Contact your administrator for the invite code.</span>
            </div>

            <button class="btn-primary" id="questDirect" type="button">Sign Up</button>
        </div>

        <button class="btn-secondary" id="returnLogin" type="button">← Back to login</button>
    </div>

    <script src="JS/signup.js"></script>
</body>
</html>
